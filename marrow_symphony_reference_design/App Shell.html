<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Marrow Symphony — App Shell</title>
  <link rel="stylesheet" href="styles/colors_and_type.css"/>
  <style>
    html, body, #root { margin:0; padding:0; height:100%; width:100%; background:#050505; }
    body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; color: var(--fg1); }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    @keyframes shell-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.15); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0s !important; animation-iteration-count: 1 !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="src/shell-data.js"></script>
  <script type="text/babel" src="src/shader.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/design-canvas.jsx"></script>
  <script type="text/babel" src="src/canvas-app.jsx"></script>
</body>
</html>
