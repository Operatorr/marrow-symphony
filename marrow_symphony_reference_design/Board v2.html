<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Marrow Symphony — Board (All Projects)</title>
  <link rel="stylesheet" href="styles/colors_and_type.css"/>
  <style>
    html, body, #root { margin:0; padding:0; height:100%; width:100%; background:#050505; overflow: hidden; }
    body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; color: var(--fg1); }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @keyframes shell-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.15); }
    }

    /* Warm amber pulse — the single semantic chroma used in the working surface */
    .b2-needs {
      animation: b2-amber-breathe 1.8s ease-in-out infinite;
    }
    @keyframes b2-amber-breathe {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(245,165,36,0.0)); }
      50%      { filter: drop-shadow(0 0 6px rgba(245,165,36,0.45)); }
    }

    /* Quiet running dot — gentle pulse, not loud */
    .b2-run {
      animation: b2-run-breathe 2.6s ease-in-out infinite;
    }
    @keyframes b2-run-breathe {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }

    /* Tiny rocking motion on the lifted card to imply it's mid-drag */
    .b2-drag-host {
      animation: b2-drag-bob 2.4s ease-in-out infinite;
      transform-origin: 50% 30%;
    }
    @keyframes b2-drag-bob {
      0%, 100% { transform: rotate(-2.5deg) translateY(0px); }
      50%      { transform: rotate(-2.2deg) translateY(-3px); }
    }

    /* Rainbow attention dot kept for chrome compatibility (sidebar/topbar may use it) */
    .ch-attn-dot {
      position: relative; display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, #da8c6b, #d930b1, #8844d8, #4e52f4, #87f3ff, #da8c6b);
      background-size: 220% 220%;
      animation: ch-attn-shift 3.4s linear infinite;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 8px rgba(217,48,177,0.6);
      flex: none;
    }
    .ch-attn-dot::after {
      content: ""; position: absolute; inset: -4px; border-radius: 50%;
      background: linear-gradient(135deg, #da8c6b, #d930b1, #8844d8, #4e52f4, #87f3ff);
      background-size: 220% 220%;
      animation: ch-attn-shift 3.4s linear infinite, ch-attn-pulse 1.6s ease-in-out infinite;
      filter: blur(4px); opacity: 0.55; z-index: -1; pointer-events: none;
    }
    @keyframes ch-attn-shift { 0% { background-position: 0% 50% } 100% { background-position: 220% 50% } }
    @keyframes ch-attn-pulse { 0%,100% { opacity: 0.55; transform: scale(1) } 50% { opacity: 0.85; transform: scale(1.2) } }

    .ch-needs-pill { animation: ch-needs-breathe 2.4s ease-in-out infinite; }
    @keyframes ch-needs-breathe {
      0%,100% { filter: brightness(1) drop-shadow(0 0 6px rgba(217,48,177,0.25)); }
      50%     { filter: brightness(1.06) drop-shadow(0 0 10px rgba(217,48,177,0.45)); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0s !important; animation-iteration-count: 1 !important; }
    }

    /* Stage: render the design at 1440×900 and scale to fit viewport */
    #stage {
      position: absolute; left: 50%; top: 50%;
      width: 1440px; height: 900px;
      transform: translate(-50%, -50%);
      background: #050505;
      box-shadow: 0 24px 80px -12px rgba(0,0,0,0.6);
      overflow: hidden;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="src/shell-data.js"></script>
  <script src="src/views-data.js"></script>
  <script type="text/babel" src="src/shader.jsx"></script>
  <script type="text/babel" src="src/chrome.jsx"></script>
  <script type="text/babel" src="src/board-v2.jsx"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(
      <Board2View sidebarOpen={true} selected="webapp" />
    );

    // Fit-to-viewport scale of the 1440×900 stage
    function fit() {
      const stage = document.getElementById('stage');
      const w = window.innerWidth, h = window.innerHeight;
      const s = Math.min(w / 1440, h / 900, 1);
      stage.style.transform = `translate(-50%, -50%) scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
